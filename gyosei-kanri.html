<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行政手続き管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --surface2: #e8eeff;
    --border: #d0d8f0;
    --accent: #3b6ef5;
    --accent2: #e53e3e;
    --accent3: #38a169;
    --accent4: #d69e2e;
    --text: #4a5568;
    --text-bright: #1a202c;
    --text-dim: #a0aec0;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }
  #root { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px;
    background: linear-gradient(135deg, #3b6ef5 0%, #6b9eff 100%);
    border-radius: 16px;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(59,110,245,0.25);
  }
  .header h1 {
    font-size: 18px; font-weight: 700; color: #fff;
    letter-spacing: 0.03em;
  }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .header .btn-add { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
  .header .btn-add:hover { background: rgba(255,255,255,0.35); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    background: none; border: none; color: var(--text-dim);
    padding: 10px 16px; cursor: pointer; font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* Alert banner */
  .alert-bar {
    background: #fff5f5;
    border: 1px solid #fed7d7;
    border-left: 4px solid var(--accent2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex; align-items: flex-start; gap: 10px;
    box-shadow: 0 2px 8px rgba(229,62,62,0.08);
  }
  .alert-bar .icon { font-size: 18px; }
  .alert-bar .title { font-size: 13px; font-weight: 700; color: #c53030; margin-bottom: 4px; }
  .alert-bar .items { font-size: 12px; color: #744210; line-height: 1.8; }
  .urgent { color: var(--accent2); font-weight: 600; }
  .warning { color: var(--accent4); font-weight: 600; }
  .ok { color: var(--accent3); }

  /* Cards grid */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(59,110,245,0.06);
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 6px 20px rgba(59,110,245,0.15); transform: translateY(-2px); }
  .card-stripe {
    position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 6px; }
  .card-meta { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .card-date-row { display: flex; justify-content: space-between; align-items: center; }
  .card-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .card-date { font-size: 13px; font-family: 'DM Mono', monospace; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
  }
  .badge-urgent { background: rgba(224,108,117,0.15); color: var(--accent2); }
  .badge-warning { background: rgba(229,192,123,0.15); color: var(--accent4); }
  .badge-ok { background: rgba(152,195,121,0.15); color: var(--accent3); }
  .badge-none { background: rgba(92,99,112,0.2); color: var(--text-dim); }

  /* Form */
  .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(59,110,245,0.06); }
  .form-section h2 { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select, .form-group textarea {
    background: #f7f9ff; border: 1.5px solid var(--border);
    color: var(--text-bright); border-radius: 8px;
    padding: 8px 10px; font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,110,245,0.12);
  }
  .form-group select option { background: var(--surface); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn {
    padding: 8px 18px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4a79df; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: rgba(224,108,117,0.15); color: var(--accent2); border: 1px solid rgba(224,108,117,0.3); }
  .btn-danger:hover { background: rgba(224,108,117,0.25); }

  /* Profile */
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .profile-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
  .profile-item label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 3px; }
  .profile-item span { font-size: 13px; color: var(--text-bright); font-family: 'DM Mono', monospace; }

  /* Draft output */
  .draft-box {
    background: var(--bg); border: 1px solid var(--accent);
    border-radius: var(--radius); padding: 16px;
    font-size: 13px; line-height: 2; white-space: pre-wrap;
    color: var(--text-bright); position: relative;
    margin-top: 16px;
  }
  .copy-btn {
    position: absolute; top: 10px; right: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 4px 12px; border-radius: 5px;
    cursor: pointer; font-size: 11px; font-family: 'Noto Sans JP', sans-serif;
  }
  .copy-btn:hover { background: var(--border); }
  .copy-btn.copied { color: var(--accent3); border-color: var(--accent3); }

  /* AI loading */
  .loading { display: flex; gap: 6px; align-items: center; padding: 16px; color: var(--text-dim); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Detail modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 100%; max-width: 540px;
    max-height: 85vh; overflow-y: auto;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(59,110,245,0.15);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { font-size: 16px; font-weight: 700; color: var(--text-bright); }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 20px; color: var(--text-dim); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* API key input */
  .api-notice {
    background: rgba(91,138,240,0.08); border: 1px solid rgba(91,138,240,0.3);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
    font-size: 12px; color: var(--text); line-height: 1.7;
  }

  @media (max-width: 500px) {
    .form-grid, .profile-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useCallback } = React;

const STORAGE_KEY = 'gyosei_data_v1';
const PROFILE_KEY = 'gyosei_profile_v1';
const APIKEY_KEY = 'gyosei_apikey_v1';

const PROCEDURE_TYPES = [
  { id: 'nanbyou', name: '指定難病', color: '#e06c75', renewMonths: 12 },
  { id: 'techou', name: '障害者手帳', color: '#5b8af0', renewMonths: 36 },
  { id: 'tokubetsu', name: '特別障害者手当', color: '#e5c07b', renewMonths: 12 },
  { id: 'iryo', name: '医療費受給者証', color: '#98c379', renewMonths: 12 },
  { id: 'fukushi', name: '障害福祉サービス', color: '#c678dd', renewMonths: 12 },
  { id: 'other', name: 'その他', color: '#56b6c2', renewMonths: 12 },
];

const DRAFT_TEMPLATES = {
  nanbyou: (profile, item) => `【指定難病 医療費助成 更新申請】

申請日：　　　年　　月　　日

○○市（区）長　様

申請者氏名：${profile.name || '　　　　'}
生年月日：${profile.birthdate || '　　　　'}
住　　所：${profile.address || '　　　　'}
電話番号：${profile.phone || '　　　　'}
受給者証番号：${item.number || '　　　　'}

このたび、指定難病医療費助成認定の更新を申請いたします。

疾患名：${item.memo || '（疾患名を入力してください）'}

以上、必要書類を添えて申請いたします。`,

  techou: (profile, item) => `【身体障害者手帳 更新申請】

申請日：　　　年　　月　　日

○○市（区）長　様

申請者氏名：${profile.name || '　　　　'}
生年月日：${profile.birthdate || '　　　　'}
住　　所：${profile.address || '　　　　'}
手帳番号：${item.number || '　　　　'}
障害等級：${item.level || '　　　　'}

上記のとおり身体障害者手帳の更新を申請いたします。
診断書・写真等の必要書類を添付いたします。`,

  tokubetsu: (profile, item) => `【特別障害者手当 現況届】

届出日：　　　年　　月　　日

○○市（区）長　様

受給者氏名：${profile.name || '　　　　'}
生年月日：${profile.birthdate || '　　　　'}
住　　所：${profile.address || '　　　　'}
受給者番号：${item.number || '　　　　'}

現在も引き続き特別障害者手当の受給要件を満たしております。
現況届を提出いたします。`,

  iryo: (profile, item) => `【自立支援医療費（更生医療）受給者証 更新申請】

申請日：　　　年　　月　　日

○○市（区）長　様

申請者氏名：${profile.name || '　　　　'}
生年月日：${profile.birthdate || '　　　　'}
住　　所：${profile.address || '　　　　'}
受給者証番号：${item.number || '　　　　'}

自立支援医療費受給者証の更新を申請いたします。
必要書類を添えて申請いたします。`,

  fukushi: (profile, item) => `【障害福祉サービス 支給申請書】

申請日：　　　年　　月　　日

○○市（区）長　様

申請者氏名：${profile.name || '　　　　'}
生年月日：${profile.birthdate || '　　　　'}
住　　所：${profile.address || '　　　　'}

上記のとおり、障害福祉サービスの支給（更新）を申請いたします。`,

  other: (profile, item) => `【${item.name} 申請書】

申請日：　　　年　　月　　日

担当窓口　御中

申請者氏名：${profile.name || '　　　　'}
住　　所：${profile.address || '　　　　'}
電話番号：${profile.phone || '　　　　'}

このたび、${item.name}について申請いたします。
${item.memo ? '\n備考：' + item.memo : ''}`,
};

// Days until expiry
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function getStatus(days) {
  if (days === null) return { label: '未設定', cls: 'badge-none', color: '#5c6370' };
  if (days < 0) return { label: '期限切れ', cls: 'badge-urgent', color: '#e06c75' };
  if (days <= 30) return { label: `あと${days}日`, cls: 'badge-urgent', color: '#e06c75' };
  if (days <= 90) return { label: `あと${days}日`, cls: 'badge-warning', color: '#e5c07b' };
  return { label: `あと${days}日`, cls: 'badge-ok', color: '#98c379' };
}

function App() {
  const [tab, setTab] = useState('list');
  const [items, setItems] = useState([]);
  const [profile, setProfile] = useState({});
  const [apiKey, setApiKey] = useState('');
  const [editItem, setEditItem] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [draftTarget, setDraftTarget] = useState(null);
  const [draftText, setDraftText] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiPrompt, setAiPrompt] = useState('');
  const [copied, setCopied] = useState(false);
  const [profileEdit, setProfileEdit] = useState(false);
  const [profileDraft, setProfileDraft] = useState({});

  useEffect(() => {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) setItems(JSON.parse(d));
    const p = localStorage.getItem(PROFILE_KEY);
    if (p) setProfile(JSON.parse(p));
    const k = localStorage.getItem(APIKEY_KEY);
    if (k) setApiKey(k);
  }, []);

  const saveItems = (next) => {
    setItems(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  };

  const saveProfile = (p) => {
    setProfile(p);
    localStorage.setItem(PROFILE_KEY, JSON.stringify(p));
  };

  const saveApiKey = (k) => {
    setApiKey(k);
    localStorage.setItem(APIKEY_KEY, k);
  };

  // Alerts
  const alerts = items
    .map(i => ({ ...i, days: daysUntil(i.expiry) }))
    .filter(i => i.days !== null && i.days <= 90)
    .sort((a, b) => a.days - b.days);

  // New/edit item
  const blankItem = () => ({
    id: Date.now().toString(),
    type: 'nanbyou', name: '', number: '', level: '',
    expiry: '', renewed: '', memo: '',
  });

  const openNew = () => { setEditItem(blankItem()); setShowModal(true); };
  const openEdit = (item) => { setEditItem({ ...item }); setShowModal(true); };

  const saveItem = () => {
    if (!editItem.name) return alert('手続き名を入力してください');
    const exists = items.find(i => i.id === editItem.id);
    if (exists) saveItems(items.map(i => i.id === editItem.id ? editItem : i));
    else saveItems([...items, editItem]);
    setShowModal(false);
  };

  const deleteItem = (id) => {
    if (confirm('削除しますか？')) saveItems(items.filter(i => i.id !== id));
  };

  // Draft
  const openDraft = (item) => {
    setDraftTarget(item);
    setDraftText('');
    setAiPrompt('');
    setTab('draft');
  };

  const genTemplate = () => {
    const tmpl = DRAFT_TEMPLATES[draftTarget.type] || DRAFT_TEMPLATES.other;
    setDraftText(tmpl(profile, draftTarget));
  };

  const genAI = async () => {
    if (!apiKey) return alert('設定タブでAPIキーを入力してください');
    setAiLoading(true);
    setDraftText('');
    try {
      const sysPrompt = `あなたは行政手続きの書類作成を支援するアシスタントです。
申請者情報：
氏名：${profile.name || '（未設定）'}
生年月日：${profile.birthdate || '（未設定）'}
住所：${profile.address || '（未設定）'}

手続き情報：
種別：${PROCEDURE_TYPES.find(t=>t.id===draftTarget.type)?.name}
手続き名：${draftTarget.name}
受給者証番号：${draftTarget.number || '（未設定）'}
障害等級：${draftTarget.level || '（未設定）'}
備考：${draftTarget.memo || '（なし）'}

以下の指示に従って申請書の下書きを日本語で作成してください。
フォーマルで丁寧な文体を使用し、空欄は「　　　　」で示してください。`;

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: sysPrompt,
          messages: [{ role: 'user', content: aiPrompt || '更新申請書の下書きを作成してください。' }],
        }),
      });
      const data = await resp.json();
      if (data.content?.[0]?.text) setDraftText(data.content[0].text);
      else setDraftText('エラーが発生しました: ' + JSON.stringify(data));
    } catch (e) {
      setDraftText('通信エラー: ' + e.message);
    }
    setAiLoading(false);
  };

  const copyDraft = () => {
    navigator.clipboard.writeText(draftText).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const typeInfo = (id) => PROCEDURE_TYPES.find(t => t.id === id) || PROCEDURE_TYPES[5];

  return (
    <div>
      <div className="header">
        <div>
          <h1>行政手続き管理</h1>
          <div className="header-sub">ヘルパーステーション欅 · 個人用</div>
        </div>
        <button className="btn-add" onClick={openNew}>＋ 追加</button>
      </div>

      {/* Alert */}
      {alerts.length > 0 && (
        <div className="alert-bar">
          <div className="icon">🔔</div>
          <div>
            <div className="title">更新期限が近い手続き</div>
            <div className="items">
              {alerts.map(a => {
                const cls = a.days < 0 ? 'urgent' : a.days <= 30 ? 'urgent' : 'warning';
                return (
                  <div key={a.id}>
                    <span className={cls}>
                      {a.days < 0 ? '期限切れ' : `あと${a.days}日`}
                    </span>
                    　{a.name}（{typeInfo(a.type).name}）— {a.expiry}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Tabs */}
      <div className="tabs">
        {[
          { id: 'list', label: '手続き一覧' },
          { id: 'profile', label: 'プロフィール' },
          { id: 'draft', label: '書類作成' },
          { id: 'settings', label: '設定' },
        ].map(t => (
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* List tab */}
      {tab === 'list' && (
        <>
          {items.length === 0 ? (
            <div className="empty">
              <div className="icon">📋</div>
              <div>手続きがまだ登録されていません</div>
              <div style={{marginTop:8, fontSize:12}}>「＋ 追加」から登録してください</div>
            </div>
          ) : (
            <div className="cards">
              {items.map(item => {
                const days = daysUntil(item.expiry);
                const status = getStatus(days);
                const ti = typeInfo(item.type);
                return (
                  <div key={item.id} className="card" onClick={() => openEdit(item)}>
                    <div className="card-stripe" style={{background: ti.color}} />
                    <div style={{marginLeft:8}}>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:4}}>
                        <div className="card-name">{item.name || ti.name}</div>
                        <span className={`badge ${status.cls}`}>{status.label}</span>
                      </div>
                      <div className="card-meta">{ti.name}</div>
                      {item.number && <div className="card-meta">No. {item.number}</div>}
                      {item.level && <div className="card-meta">等級: {item.level}</div>}
                      <div className="card-date-row" style={{marginTop:8}}>
                        <div>
                          <div className="card-label">更新期限</div>
                          <div className="card-date" style={{color: status.color}}>{item.expiry || '未設定'}</div>
                        </div>
                        <button
                          className="btn btn-secondary"
                          style={{fontSize:11, padding:'4px 10px'}}
                          onClick={e => { e.stopPropagation(); openDraft(item); }}
                        >書類作成</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}

      {/* Profile tab */}
      {tab === 'profile' && (
        <div className="form-section">
          <h2>基本情報（申請書に自動入力されます）</h2>
          {profileEdit ? (
            <>
              <div className="form-grid">
                {[
                  { key: 'name', label: '氏名' },
                  { key: 'kana', label: 'ふりがな', inputMode: 'hiragana' },
                  { key: 'birthdate', label: '生年月日', type: 'date' },
                  { key: 'phone', label: '電話番号', type: 'tel', inputMode: 'numeric' },
                  { key: 'address', label: '住所（都道府県〜番地）' },
                  { key: 'mynum', label: 'マイナンバー', disabled: true },
                ].map(f => (
                  <div key={f.key} className={`form-group ${f.key==='address'?'full':''}`}>
                    <label style={f.disabled ? {color:'#a0aec0'} : {}}>
                      {f.label}
                      {f.disabled && <span style={{marginLeft:6, fontSize:10, background:'#fed7d7', color:'#c53030', padding:'1px 6px', borderRadius:4, fontWeight:600}}>入力不可 🔒</span>}
                    </label>
                    <input
                      type={f.type || 'text'}
                      inputMode={f.inputMode}
                      value={f.disabled ? '' : (profileDraft[f.key] || '')}
                      onChange={e => !f.disabled && setProfileDraft({...profileDraft, [f.key]: e.target.value})}
                      placeholder={f.disabled ? 'セキュリティのため保存しません' : f.label}
                      disabled={f.disabled}
                      style={f.disabled ? {background:'#f7fafc', color:'#a0aec0', cursor:'not-allowed', borderColor:'#e2e8f0', borderStyle:'dashed'} : {}}
                    />
                  </div>
                ))}
              </div>
              <div className="form-actions">
                <button className="btn btn-primary" onClick={() => { saveProfile(profileDraft); setProfileEdit(false); }}>保存</button>
                <button className="btn btn-secondary" onClick={() => setProfileEdit(false)}>キャンセル</button>
              </div>
            </>
          ) : (
            <>
              <div className="profile-grid">
                {[
                  { key: 'name', label: '氏名' },
                  { key: 'kana', label: 'ふりがな' },
                  { key: 'birthdate', label: '生年月日' },
                  { key: 'phone', label: '電話番号' },
                  { key: 'address', label: '住所' },
                  { key: 'mynum', label: 'マイナンバー', disabled: true },
                ].map(f => (
                  <div key={f.key} className={`profile-item ${f.key==='address'?'full':''}`}
                    style={{
                      ...(f.key==='address'?{gridColumn:'1/-1'}:{}),
                      ...(f.disabled ? {background:'#f7fafc', borderStyle:'dashed', borderColor:'#e2e8f0'} : {})
                    }}>
                    <label style={f.disabled ? {color:'#a0aec0'} : {}}>
                      {f.label}
                      {f.disabled && <span style={{marginLeft:6, fontSize:10, background:'#fed7d7', color:'#c53030', padding:'1px 5px', borderRadius:3, fontWeight:600}}>🔒 保存しません</span>}
                    </label>
                    <span style={f.disabled ? {color:'#a0aec0', fontSize:12} : {}}>
                      {f.disabled ? 'セキュリティのため非対応' : (profile[f.key] || '未設定')}
                    </span>
                  </div>
                ))}
              </div>
              <div className="form-actions" style={{marginTop:16}}>
                <button className="btn btn-primary" onClick={() => { setProfileDraft({...profile}); setProfileEdit(true); }}>編集</button>
              </div>
            </>
          )}
        </div>
      )}

      {/* Draft tab */}
      {tab === 'draft' && (
        <>
          {!draftTarget ? (
            <div className="empty">
              <div className="icon">📝</div>
              <div>手続き一覧から「書類作成」をクリックしてください</div>
            </div>
          ) : (
            <>
              <div className="form-section">
                <h2>📄 {draftTarget.name || typeInfo(draftTarget.type).name}</h2>
                <div style={{color: 'var(--text-dim)', fontSize:12, marginBottom:16}}>
                  {typeInfo(draftTarget.type).name}　受給者証番号: {draftTarget.number || '未設定'}
                </div>

                <div className="form-group full" style={{marginBottom:12}}>
                  <label>AIへの追加指示（任意）</label>
                  <textarea
                    value={aiPrompt}
                    onChange={e => setAiPrompt(e.target.value)}
                    placeholder="例：更新の理由として体調変化についても記載してください"
                  />
                </div>

                <div className="form-actions">
                  <button className="btn btn-secondary" onClick={genTemplate}>📋 テンプレートを使う</button>
                  <button className="btn btn-primary" onClick={genAI} disabled={aiLoading}>
                    {aiLoading ? '生成中...' : '✨ AIで生成'}
                  </button>
                  {draftText && (
                    <button className="btn btn-secondary" onClick={() => { setDraftTarget(null); setDraftText(''); }}>← 戻る</button>
                  )}
                </div>
              </div>

              {aiLoading && (
                <div className="loading">
                  <div className="dot"/><div className="dot"/><div className="dot"/>
                  <span style={{fontSize:12}}>AIが下書きを生成中...</span>
                </div>
              )}

              {draftText && (
                <div style={{position:'relative'}}>
                  <div className="draft-box">{draftText}</div>
                  <button className={`copy-btn ${copied ? 'copied' : ''}`} onClick={copyDraft}>
                    {copied ? '✓ コピー済み' : 'コピー'}
                  </button>
                </div>
              )}
            </>
          )}
        </>
      )}

      {/* Settings tab */}
      {tab === 'settings' && (
        <div>
          <div className="form-section">
            <h2>🤖 AI設定</h2>
            <div className="api-notice">
              AIによる書類生成にはAnthropicのAPIキーが必要です。<br/>
              APIキーはこの端末のlocalStorageにのみ保存されます。<br/>
              <a href="https://console.anthropic.com/" target="_blank" style={{color:'var(--accent)'}}>console.anthropic.com</a> で取得できます。
            </div>
            <div className="form-group">
              <label>Anthropic APIキー</label>
              <input
                type="password"
                value={apiKey}
                onChange={e => saveApiKey(e.target.value)}
                placeholder="sk-ant-..."
              />
            </div>
          </div>

          <div className="form-section">
            <h2>💾 データのバックアップ・引き継ぎ</h2>
            <div className="api-notice" style={{background:'#f0fff4', borderColor:'#c6f6d5', borderLeftColor:'var(--accent3)'}}>
              <strong>機種変更・Safari履歴削除の前に必ずエクスポートしてください。</strong><br/>
              JSONファイルをダウンロードして保管し、新しい端末でインポートすると復元できます。
            </div>
            <div className="form-actions">
              <button className="btn btn-primary" onClick={() => {
                const data = {
                  items: JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'),
                  profile: JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}'),
                  exportedAt: new Date().toISOString(),
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `gyosei-backup-${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.json`;
                a.click();
                URL.revokeObjectURL(url);
              }}>📥 JSONでエクスポート</button>

              <label className="btn btn-secondary" style={{cursor:'pointer'}}>
                📤 JSONからインポート
                <input type="file" accept=".json" style={{display:'none'}} onChange={e => {
                  const file = e.target.files[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = ev => {
                    try {
                      const data = JSON.parse(ev.target.result);
                      if (data.items) saveItems(data.items);
                      if (data.profile) saveProfile(data.profile);
                      alert('インポートが完了しました！');
                    } catch(err) {
                      alert('ファイルの読み込みに失敗しました。正しいJSONファイルか確認してください。');
                    }
                  };
                  reader.readAsText(file);
                  e.target.value = '';
                }} />
              </label>
            </div>
          </div>

          <div className="form-section">
            <h2 style={{color:'var(--accent2)'}}>⚠️ データ削除</h2>
            <button className="btn btn-danger" onClick={() => {
              if (confirm('すべてのデータを削除しますか？')) {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem(PROFILE_KEY);
                setItems([]); setProfile({});
              }
            }}>データをすべて削除</button>
          </div>
        </div>
      )}

      {/* Modal: add/edit */}
      {showModal && editItem && (
        <div className="modal-overlay" onClick={() => setShowModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2>{items.find(i=>i.id===editItem.id) ? '手続きを編集' : '手続きを追加'}</h2>
              <button className="close-btn" onClick={() => setShowModal(false)}>×</button>
            </div>

            <div className="form-grid" style={{gridTemplateColumns:'1fr'}}>
              <div className="form-group">
                <label>種別</label>
                <select value={editItem.type} onChange={e => setEditItem({...editItem, type: e.target.value})}>
                  {PROCEDURE_TYPES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>手続き名（任意）</label>
                <input value={editItem.name} onChange={e => setEditItem({...editItem, name: e.target.value})} placeholder="省略可" />
              </div>
              <div className="form-group">
                <label>受給者証番号</label>
                <input inputMode="numeric" value={editItem.number} onChange={e => setEditItem({...editItem, number: e.target.value})} placeholder="例: 12-345678" />
              </div>
              <div className="form-group">
                <label>障害等級・区分</label>
                <select value={editItem.level} onChange={e => setEditItem({...editItem, level: e.target.value})}>
                  <option value="">選択してください</option>
                  <option value="1級">1級</option>
                  <option value="2級">2級</option>
                  <option value="3級">3級</option>
                  <option value="4級">4級</option>
                  <option value="5級">5級</option>
                  <option value="6級">6級</option>
                  <option value="区分1">区分1</option>
                  <option value="区分2">区分2</option>
                  <option value="区分3">区分3</option>
                  <option value="区分4">区分4</option>
                  <option value="区分5">区分5</option>
                  <option value="区分6">区分6</option>
                  <option value="該当なし">該当なし</option>
                </select>
              </div>
              <div className="form-group">
                <label>更新期限</label>
                <input type="date" value={editItem.expiry} onChange={e => setEditItem({...editItem, expiry: e.target.value})} />
              </div>
              <div className="form-group">
                <label>最終更新日</label>
                <input type="date" value={editItem.renewed} onChange={e => setEditItem({...editItem, renewed: e.target.value})} />
              </div>
              <div className="form-group">
                <label>メモ（疾患名・担当窓口など）</label>
                <textarea value={editItem.memo} onChange={e => setEditItem({...editItem, memo: e.target.value})} placeholder="例: 球脊髄性筋萎縮症 / ○○市障害福祉課" />
              </div>
            </div>

            <div className="form-actions">
              <button className="btn btn-primary" onClick={saveItem}>保存</button>
              <button className="btn btn-secondary" onClick={() => setShowModal(false)}>キャンセル</button>
              {items.find(i=>i.id===editItem.id) && (
                <button className="btn btn-danger" onClick={() => { deleteItem(editItem.id); setShowModal(false); }}>削除</button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
